<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc"><title id="title">ORCA half-plane</title><desc id="desc">One neighbor creates a half-plane of valid velocities.</desc><defs><style>
  .bg{fill:#f2f2f2}.panel{fill:#fff;stroke:#ddd;stroke-width:2}.blue{fill:#a9d8e8}.blue2{fill:#7fc3dc}.gray{fill:#cfcfcf}.soft{fill:#e2e2e2}.dark{fill:#222}.muted{fill:#777}.line{stroke:#aaa;stroke-width:2;fill:none}.strong{stroke:#333;stroke-width:3;fill:none}.dash{stroke:#999;stroke-width:2;stroke-dasharray:7 7;fill:none}.arrow{stroke:#666;stroke-width:3;fill:none;marker-end:url(#arrow)}.red{fill:#ef8f8f}.green{fill:#9ed68a}.yellow{fill:#f2cf74}.cell{fill:#fff;stroke:#bbb;stroke-width:2}.cellB{fill:#a9d8e8;stroke:#8fbccc;stroke-width:2}.cellG{fill:#ddd;stroke:#bbb;stroke-width:2}.txt{fill:#222;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:24px;font-weight:700;text-anchor:middle}.small{fill:#333;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:18px;font-weight:700;text-anchor:middle}.cap{fill:#555;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:20px;font-weight:700}.mini{fill:#777;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:15px;font-weight:700;text-anchor:middle}.mono{fill:#222;font-family:Consolas,'Cascadia Mono',monospace;font-size:18px;font-weight:700;text-anchor:middle}</style><marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#666"/></marker></defs><rect class="bg" width="960" height="540"/><text class="cap" x="80" y="70">One ORCA line</text><rect class="panel" x="190" y="120" width="580" height="330" rx="4"/><path d="M 285 370 L 705 160" stroke="#777" stroke-width="4"/><path d="M 285 370 L 760 370 L 760 160 L 705 160 Z" fill="#a9d8e8" opacity="0.42"/><circle class="red" cx="455" cy="300" r="16"/><circle class="blue" cx="590" cy="245" r="16"/><text class="small" x="455" y="335">preferred</text><text class="small" x="590" y="280">projected</text><path class="arrow" d="M 455 300 L 590 245"/><text class="small" x="560" y="455">valid side of the line</text></svg>
