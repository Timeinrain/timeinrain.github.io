<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc"><title id="title">Sliding window</title><desc id="desc">Sliding window maintains a contiguous range while expanding and shrinking.</desc><defs><style>
  .bg{fill:#f2f2f2}.panel{fill:#fff;stroke:#ddd;stroke-width:2}.blue{fill:#a9d8e8}.blue2{fill:#7fc3dc}.gray{fill:#cfcfcf}.soft{fill:#e2e2e2}.dark{fill:#222}.muted{fill:#777}.line{stroke:#aaa;stroke-width:2;fill:none}.strong{stroke:#333;stroke-width:3;fill:none}.dash{stroke:#999;stroke-width:2;stroke-dasharray:7 7;fill:none}.arrow{stroke:#666;stroke-width:3;fill:none;marker-end:url(#arrow)}.red{fill:#ef8f8f}.green{fill:#9ed68a}.yellow{fill:#f2cf74}.cell{fill:#fff;stroke:#bbb;stroke-width:2}.cellB{fill:#a9d8e8;stroke:#8fbccc;stroke-width:2}.cellG{fill:#ddd;stroke:#bbb;stroke-width:2}.txt{fill:#222;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:24px;font-weight:700;text-anchor:middle}.small{fill:#333;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:18px;font-weight:700;text-anchor:middle}.cap{fill:#555;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:20px;font-weight:700}.mini{fill:#777;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:15px;font-weight:700;text-anchor:middle}.mono{fill:#222;font-family:Consolas,'Cascadia Mono',monospace;font-size:18px;font-weight:700;text-anchor:middle}</style><marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#666"/></marker></defs><rect class="bg" width="960" height="540"/><text class="cap" x="80" y="70">current window [l, r]</text><rect class="cell" x="145" y="205" width="78" height="58" rx="0"/><text class="small" x="184" y="237">2</text><rect class="cell" x="223" y="205" width="78" height="58" rx="0"/><text class="small" x="262" y="237">1</text><rect class="cellB" x="301" y="205" width="78" height="58" rx="0"/><text class="small" x="340" y="237">3</text><rect class="cellB" x="379" y="205" width="78" height="58" rx="0"/><text class="small" x="418" y="237">2</text><rect class="cellB" x="457" y="205" width="78" height="58" rx="0"/><text class="small" x="496" y="237">4</text><rect class="cell" x="535" y="205" width="78" height="58" rx="0"/><text class="small" x="574" y="237">1</text><rect class="cell" x="613" y="205" width="78" height="58" rx="0"/><text class="small" x="652" y="237">2</text><rect class="line" x="301" y="190" width="234" height="88" rx="0"/><path class="arrow" d="M 301 180 L 301 135"/><path class="arrow" d="M 535 180 L 535 135"/><text class="small" x="301" y="120">l</text><text class="small" x="535" y="120">r</text><text class="small" x="480" y="345">Only l and r move forward.</text></svg>
