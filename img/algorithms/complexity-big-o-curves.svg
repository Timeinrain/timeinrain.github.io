<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc"><title id="title">Big O curves</title><desc id="desc">Comparison of common complexity growth curves.</desc><defs><style>
  .bg{fill:#f2f2f2}.panel{fill:#fff;stroke:#ddd;stroke-width:2}.blue{fill:#a9d8e8}.blue2{fill:#7fc3dc}.gray{fill:#cfcfcf}.soft{fill:#e2e2e2}.dark{fill:#222}.muted{fill:#777}.line{stroke:#aaa;stroke-width:2;fill:none}.strong{stroke:#333;stroke-width:3;fill:none}.dash{stroke:#999;stroke-width:2;stroke-dasharray:7 7;fill:none}.arrow{stroke:#666;stroke-width:3;fill:none;marker-end:url(#arrow)}.red{fill:#ef8f8f}.green{fill:#9ed68a}.yellow{fill:#f2cf74}.cell{fill:#fff;stroke:#bbb;stroke-width:2}.cellB{fill:#a9d8e8;stroke:#8fbccc;stroke-width:2}.cellG{fill:#ddd;stroke:#bbb;stroke-width:2}.txt{fill:#222;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:24px;font-weight:700;text-anchor:middle}.small{fill:#333;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:18px;font-weight:700;text-anchor:middle}.cap{fill:#555;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:20px;font-weight:700}.mini{fill:#777;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:15px;font-weight:700;text-anchor:middle}.mono{fill:#222;font-family:Consolas,'Cascadia Mono',monospace;font-size:18px;font-weight:700;text-anchor:middle}</style><marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#666"/></marker></defs><rect class="bg" width="960" height="540"/><text class="cap" x="82" y="70">Growth trend</text><line class="strong" x1="130" y1="450" x2="830" y2="450"/><line class="strong" x1="130" y1="450" x2="130" y2="105"/><path d="M150 420 C360 405 600 380 810 350" stroke="#7fc3dc" stroke-width="6" fill="none"/><path d="M150 435 C360 420 560 350 810 170" stroke="#f2cf74" stroke-width="6" fill="none"/><path d="M150 445 C360 435 500 360 585 115" stroke="#ef8f8f" stroke-width="6" fill="none"/><text class="small" x="850" y="354">O(n)</text><text class="small" x="850" y="176">O(n log n)</text><text class="small" x="625" y="120">O(n²)</text><text class="small" x="820" y="484">n</text><text cla