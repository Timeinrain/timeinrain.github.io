<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc"><title id="title">Merge step</title><desc id="desc">Two sorted runs are merged by repeatedly taking the smaller front element.</desc><defs><style>
  .bg{fill:#f2f2f2}.panel{fill:#fff;stroke:#ddd;stroke-width:2}.blue{fill:#a9d8e8}.blue2{fill:#7fc3dc}.gray{fill:#cfcfcf}.soft{fill:#e2e2e2}.dark{fill:#222}.muted{fill:#777}.line{stroke:#aaa;stroke-width:2;fill:none}.strong{stroke:#333;stroke-width:3;fill:none}.dash{stroke:#999;stroke-width:2;stroke-dasharray:7 7;fill:none}.arrow{stroke:#666;stroke-width:3;fill:none;marker-end:url(#arrow)}.red{fill:#ef8f8f}.green{fill:#9ed68a}.yellow{fill:#f2cf74}.cell{fill:#fff;stroke:#bbb;stroke-width:2}.cellB{fill:#a9d8e8;stroke:#8fbccc;stroke-width:2}.cellG{fill:#ddd;stroke:#bbb;stroke-width:2}.txt{fill:#222;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:24px;font-weight:700;text-anchor:middle}.small{fill:#333;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:18px;font-weight:700;text-anchor:middle}.cap{fill:#555;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:20px;font-weight:700}.mini{fill:#777;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:15px;font-weight:700;text-anchor:middle}.mono{fill:#222;font-family:Consolas,'Cascadia Mono',monospace;font-size:18px;font-weight:700;text-anchor:middle}</style><marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#666"/></marker></defs><rect class="bg" width="960" height="540"/><text class="cap" x="80" y="70">Merge two sorted runs</text><rect class="cellB" x="135" y="130" width="64" height="54" rx="0"/><text class="small" x="167" y="162">1</text><rect class="cell" x="199" y="130" width="64" height="54" rx="0"/><text class="small" x="231" y="162">3</text><rect class="cell" x="263" y="130" width="64" height="54" rx="0"/><text class="small" x="295" y="162">7</text><rect class="cell" x="327" y="130" width="64" height="54" rx="0"/><text class="small" x="359" y="162">8</text><rect class="cellB" x="580" y="130" width="64" height="54" rx="0"/><text class="small" x="612" y="162">2</text><rect class="cell" x="644" y="130" width="64" height="54" rx="0"/><text class="small" x="676" y="162">4</text><rect class="cell" x="708" y="130" width="64" height="54" rx="0"/><text class="small" x="740" y="162">6</text><rect class="cell" x="772" y="130" width="64" height="54" rx="0"/><text class="small" x="804" y="162">9</text><text class="small" x="480" y="163">compare</text><text class="small" x="480" y="195">1 &lt; 2</text><path class="arrow" d="M 166 200 C 220 270 280 305 335 350"/><path class="arrow" d="M 612 200 C 560 270 505 305 425 350"/><rect class="cellB" x="245" y="355" width="62" height="54" rx="0"/><text class="small" x="276" y="387">1</text><rect class="cellB" x="307" y="355" width="62" height="54" rx="0"/><text class="small" x="338" y="387">2</text><rect class="cellG" x="369" y="355" width="62" height="54" rx="0"/><text class="small" x="400" y="387">_</text><rect class="cellG" x="431" y="355" width="62" height="54" rx="0"/><text class="small" x="462" y="387">_</text><rect class="cellG" x="493" y="355" width="62" height="54" rx="0"/><text class="small" x="524" y="387">_</text><rect class="cellG" x="555" y="355" width="62" height="54" rx="0"/><text class="small" x="586" y="387">_</text><rect class="cellG" x="617" y="355" width="62" height="54" rx="0"/><text class="small" x="648" y="387">_</text><rect class="cellG" x="679" y="355" width="62" height="54" rx="0"/><text class="small" x="710" y="387">_</text><text class="small" x="490" y="455">output after two choices</text></svg>
