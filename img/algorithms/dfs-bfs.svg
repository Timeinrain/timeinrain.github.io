<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc"><title id="title">DFS and BFS</title><desc id="desc">DFS follows one path deeply; BFS expands by layers.</desc><defs><style>
  .bg{fill:#f2f2f2}.panel{fill:#fff;stroke:#ddd;stroke-width:2}.blue{fill:#a9d8e8}.blue2{fill:#7fc3dc}.gray{fill:#cfcfcf}.soft{fill:#e2e2e2}.dark{fill:#222}.muted{fill:#777}.line{stroke:#aaa;stroke-width:2;fill:none}.strong{stroke:#333;stroke-width:3;fill:none}.dash{stroke:#999;stroke-width:2;stroke-dasharray:7 7;fill:none}.arrow{stroke:#666;stroke-width:3;fill:none;marker-end:url(#arrow)}.red{fill:#ef8f8f}.green{fill:#9ed68a}.yellow{fill:#f2cf74}.cell{fill:#fff;stroke:#bbb;stroke-width:2}.cellB{fill:#a9d8e8;stroke:#8fbccc;stroke-width:2}.cellG{fill:#ddd;stroke:#bbb;stroke-width:2}.txt{fill:#222;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:24px;font-weight:700;text-anchor:middle}.small{fill:#333;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:18px;font-weight:700;text-anchor:middle}.cap{fill:#555;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:20px;font-weight:700}.mini{fill:#777;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:15px;font-weight:700;text-anchor:middle}.mono{fill:#222;font-family:Consolas,'Cascadia Mono',monospace;font-size:18px;font-weight:700;text-anchor:middle}</style><marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#666"/></marker></defs><rect class="bg" width="960" height="540"/><text class="cap" x="100" y="70">DFS</text><text class="cap" x="560" y="70">BFS</text><line class="line" x1="190" y1="150" x2="190" y2="250"/><line class="line" x1="190" y1="250" x2="120" y2="350"/><line class="line" x1="190" y1="250" x2="260" y2="350"/><circle class="blue" cx="190" cy="150" r="24"/><circle class="blue" cx="190" cy="250" r="24"/><circle class="blue" cx="120" cy="350" r="24"/><circle class="gray" cx="260" cy="350" r="24"/><line class="line" x1="640" y1="150" x2="560" y2="250"/><line class="line" x1="640" y1="150" x2="720" y2="250"/><line class="line" x1="560" y1="250" x2="510" y2="350"/><line class="line" x1="560" y1="250" x2="610" y2="350"/><circle class="blue" cx="640" cy="150" r="24"/><circle class="blue" cx="560" cy="250" r="24"/><circle class="blue" cx="720" cy="250" r="24"/><circle class="gray" cx="510" cy="350" r="24"/><circle class="gray" cx="610" cy="350" r="24"/><text class="small" x="190" y="430">deep path first</text><text class="small" x="640" y="430">layer by layer</text></svg>
