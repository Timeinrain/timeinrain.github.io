<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc"><title id="title">Stable sorting</title><desc id="desc">Stable sorting keeps equal keys in their original relative order.</desc><defs><style>
  .bg{fill:#f2f2f2}.panel{fill:#fff;stroke:#ddd;stroke-width:2}.blue{fill:#a9d8e8}.blue2{fill:#7fc3dc}.gray{fill:#cfcfcf}.soft{fill:#e2e2e2}.dark{fill:#222}.muted{fill:#777}.line{stroke:#aaa;stroke-width:2;fill:none}.strong{stroke:#333;stroke-width:3;fill:none}.dash{stroke:#999;stroke-width:2;stroke-dasharray:7 7;fill:none}.arrow{stroke:#666;stroke-width:3;fill:none;marker-end:url(#arrow)}.red{fill:#ef8f8f}.green{fill:#9ed68a}.yellow{fill:#f2cf74}.cell{fill:#fff;stroke:#bbb;stroke-width:2}.cellB{fill:#a9d8e8;stroke:#8fbccc;stroke-width:2}.cellG{fill:#ddd;stroke:#bbb;stroke-width:2}.txt{fill:#222;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:24px;font-weight:700;text-anchor:middle}.small{fill:#333;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:18px;font-weight:700;text-anchor:middle}.cap{fill:#555;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:20px;font-weight:700}.mini{fill:#777;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:15px;font-weight:700;text-anchor:middle}.mono{fill:#222;font-family:Consolas,'Cascadia Mono',monospace;font-size:18px;font-weight:700;text-anchor:middle}</style><marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#666"/></marker></defs><rect class="bg" width="960" height="540"/><text class="cap" x="80" y="70">Stable: equal keys keep order</text><rect class="cellB" x="200" y="135" width="90" height="56" rx="0"/><text class="small" x="245" y="167">2A</text><rect class="cell" x="290" y="135" width="90" height="56" rx="0"/><text class="small" x="335" y="167">1B</text><rect class="cellB" x="380" y="135" width="90" height="56" rx="0"/><text class="small" x="425" y="167">2C</text><rect class="cell" x="470" y="135" width="90" height="56" rx="0"/><text class="small" x="515" y="167">1D</text><path class="arrow" d="M 380 210 L 380 310"/><rect class="cell" x="200" y="335" width="90" height="56" rx="0"/><text class="small" x="245" y="367">1B</text><rect class="cell" x="290" y="335" width="90" height="56" rx="0"/><text class="small" x="335" y="367">1D</text><rect class="cellB" x="380" y="335" width="90" height="56" rx="0"/><text class="small" x="425" y="367">2A</text><rect class="cellB" x="470" y="335" width="90" height="56" rx="0"/><text class="small" x="515" y="367">2C</text><text class="small" x="500" y="370">A before C remains A before C</text></svg>
