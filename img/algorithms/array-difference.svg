<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc"><title id="title">Difference array</title><desc id="desc">Difference array stores where an interval update starts and ends.</desc><defs><style>
  .bg{fill:#f2f2f2}.panel{fill:#fff;stroke:#ddd;stroke-width:2}.blue{fill:#a9d8e8}.blue2{fill:#7fc3dc}.gray{fill:#cfcfcf}.soft{fill:#e2e2e2}.dark{fill:#222}.muted{fill:#777}.line{stroke:#aaa;stroke-width:2;fill:none}.strong{stroke:#333;stroke-width:3;fill:none}.dash{stroke:#999;stroke-width:2;stroke-dasharray:7 7;fill:none}.arrow{stroke:#666;stroke-width:3;fill:none;marker-end:url(#arrow)}.red{fill:#ef8f8f}.green{fill:#9ed68a}.yellow{fill:#f2cf74}.cell{fill:#fff;stroke:#bbb;stroke-width:2}.cellB{fill:#a9d8e8;stroke:#8fbccc;stroke-width:2}.cellG{fill:#ddd;stroke:#bbb;stroke-width:2}.txt{fill:#222;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:24px;font-weight:700;text-anchor:middle}.small{fill:#333;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:18px;font-weight:700;text-anchor:middle}.cap{fill:#555;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:20px;font-weight:700}.mini{fill:#777;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:15px;font-weight:700;text-anchor:middle}.mono{fill:#222;font-family:Consolas,'Cascadia Mono',monospace;font-size:18px;font-weight:700;text-anchor:middle}</style><marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#666"/></marker></defs><rect class="bg" width="960" height="540"/><text class="cap" x="80" y="78">add +3 to [1, 3]</text><rect class="cell" x="140" y="140" width="74" height="54" rx="0"/><text class="small" x="177" y="172">a0</text><rect class="cellB" x="214" y="140" width="74" height="54" rx="0"/><text class="small" x="251" y="172">a1</text><rect class="cellB" x="288" y="140" width="74" height="54" rx="0"/><text class="small" x="325" y="172">a2</text><rect class="cellB" x="362" y="140" width="74" height="54" rx="0"/><text class="small" x="399" y="172">a3</text><rect class="cell" x="436" y="140" width="74" height="54" rx="0"/><text class="small" x="473" y="172">a4</text><path class="arrow" d="M 252 210 L 252 292"/><path class="arrow" d="M 474 210 L 474 292"/><rect class="cell" x="140" y="315" width="74" height="54" rx="0"/><text class="small" x="177" y="347">0</text><rect class="cellB" x="214" y="315" width="74" height="54" rx="0"/><text class="small" x="251" y="347">+3</text><rect class="cell" x="288" y="315" width="74" height="54" rx="0"/><text class="small" x="325" y="347">0</text><rect class="cell" x="362" y="315" width="74" height="54" rx="0"/><text class="small" x="399" y="347">0</text><rect class="cellB" x="436" y="315" width="74" height="54" rx="0"/><text class="small" x="473" y="347">-3</text><text class="small" x="405" y="410">diff[l] += x, diff[r + 1] -= x</text></svg>
