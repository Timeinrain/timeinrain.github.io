<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc"><title id="title">并查集、树状数组与线段树</title><desc id="desc">Pixel parchment title image for 并查集、树状数组与线段树.</desc><defs><pattern id="p" width="18" height="18" patternUnits="userSpaceOnUse"><rect width="18" height="18" fill="#f1d590"/><rect x="0" y="0" width="4" height="4" fill="#e6c67e" opacity=".45"/><rect x="12" y="10" width="3" height="3" fill="#fff1b6" opacity=".45"/></pattern><style>.bgc{fill:url(#p)}.ink{fill:#211007}.edge{fill:none;stroke:#211007;stroke-width:8}.inner{fill:none;stroke:#8a5524;stroke-width:4}.gold{fill:#d9a74c}.teal{fill:#78bed1}.ruby{fill:#d47a67}.soft{fill:#fff0bf;opacity:.58}.t{fill:#211007;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:42px;font-weight:800;text-anchor:middle}.s{fill:#5f3515;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:22px;font-weight:700;text-anchor:middle}</style></defs><rect class="bgc" width="1280" height="720"/><rect class="edge" x="32" y="32" width="1216" height="656" rx="8"/><rect class="inner" x="56" y="56" width="1168" height="608" rx="4"/><rect class="soft" x="110" y="112" width="1060" height="496" rx="6"/><path d="M780 290 L900 430" stroke="#211007" stroke-width="8"/><path d="M780 290 L720 430" stroke="#211007" stroke-width="8"/><path d="M500 290 L570 430" stroke="#211007" stroke-width="8"/><path d="M500 290 L390 430" stroke="#211007" stroke-width="8"/><path d="M640 170 L780 290" stroke="#211007" stroke-width="8"/><path d="M640 170 L500 290" stroke="#211007" stroke-width="8"/><circle class="teal" cx="640" cy="170" r="36"/><circle class="teal" cx="500" cy="290" r="32"/><circle class="gold" cx="780" cy="290" r="32"/><circle class="teal" cx="390" cy="430" r="32"/><circle class="gold" cx="570" cy="430" r="32"/><circle class="teal" cx="720" cy="430" r="32"/><circle class="gold" cx="900" cy="430" r="32"/></svg>
