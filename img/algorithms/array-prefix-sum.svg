<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc"><title id="title">Prefix sum</title><desc id="desc">Prefix sums answer range sum queries by subtracting two accumulated values.</desc><defs><style>
  .bg{fill:#f2f2f2}.panel{fill:#fff;stroke:#ddd;stroke-width:2}.blue{fill:#a9d8e8}.blue2{fill:#7fc3dc}.gray{fill:#cfcfcf}.soft{fill:#e2e2e2}.dark{fill:#222}.muted{fill:#777}.line{stroke:#aaa;stroke-width:2;fill:none}.strong{stroke:#333;stroke-width:3;fill:none}.dash{stroke:#999;stroke-width:2;stroke-dasharray:7 7;fill:none}.arrow{stroke:#666;stroke-width:3;fill:none;marker-end:url(#arrow)}.red{fill:#ef8f8f}.green{fill:#9ed68a}.yellow{fill:#f2cf74}.cell{fill:#fff;stroke:#bbb;stroke-width:2}.cellB{fill:#a9d8e8;stroke:#8fbccc;stroke-width:2}.cellG{fill:#ddd;stroke:#bbb;stroke-width:2}.txt{fill:#222;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:24px;font-weight:700;text-anchor:middle}.small{fill:#333;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:18px;font-weight:700;text-anchor:middle}.cap{fill:#555;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:20px;font-weight:700}.mini{fill:#777;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:15px;font-weight:700;text-anchor:middle}.mono{fill:#222;font-family:Consolas,'Cascadia Mono',monospace;font-size:18px;font-weight:700;text-anchor:middle}</style><marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#666"/></marker></defs><rect class="bg" width="960" height="540"/><text class="cap" x="80" y="78">prefix[i + 1] = prefix[i] + a[i]</text><rect class="cell" x="130" y="140" width="70" height="54" rx="0"/><text class="small" x="165" y="172">3</text><rect class="cellB" x="200" y="140" width="70" height="54" rx="0"/><text class="small" x="235" y="172">1</text><rect class="cellB" x="270" y="140" width="70" height="54" rx="0"/><text class="small" x="305" y="172">4</text><rect class="cellB" x="340" y="140" width="70" height="54" rx="0"/><text class="small" x="375" y="172">2</text><rect class="cell" x="410" y="140" width="70" height="54" rx="0"/><text class="small" x="445" y="172">5</text><text class="small" x="305" y="125">range [1, 3]</text><path class="arrow" d="M 165 210 L 165 295"/><path class="arrow" d="M 445 210 L 445 295"/><rect class="cell" x="100" y="315" width="70" height="54" rx="0"/><text class="small" x="135" y="347">0</text><rect class="cellB" x="170" y="315" width="70" height="54" rx="0"/><text class="small" x="205" y="347">3</text><rect class="cell" x="240" y="315" width="70" height="54" rx="0"/><text class="small" x="275" y="347">4</text><rect class="cell" x="310" y="315" width="70" height="54" rx="0"/><text class="small" x="345" y="347">8</text><rect class="cellB" x="380" y="315" width="70" height="54" rx="0"/><text class="small" x="415" y="347">10</text><rect class="cell" x="450" y="315" width="70" height="54" rx="0"/><text class="small" x="485" y="347">15</text><text class="small" x="275" y="410">sum(1,3) = prefix[4] - prefix[1] = 10 - 3 = 7</text></svg>
