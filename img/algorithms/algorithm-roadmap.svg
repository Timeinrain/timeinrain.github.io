<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc"><title id="title">Algorithm roadmap</title><desc id="desc">A roadmap of the algorithm notes from basics to advanced data structures.</desc><defs><style>
  .bg{fill:#f2f2f2}.panel{fill:#fff;stroke:#ddd;stroke-width:2}.blue{fill:#a9d8e8}.blue2{fill:#7fc3dc}.gray{fill:#cfcfcf}.soft{fill:#e2e2e2}.dark{fill:#222}.muted{fill:#777}.line{stroke:#aaa;stroke-width:2;fill:none}.strong{stroke:#333;stroke-width:3;fill:none}.dash{stroke:#999;stroke-width:2;stroke-dasharray:7 7;fill:none}.arrow{stroke:#666;stroke-width:3;fill:none;marker-end:url(#arrow)}.red{fill:#ef8f8f}.green{fill:#9ed68a}.yellow{fill:#f2cf74}.cell{fill:#fff;stroke:#bbb;stroke-width:2}.cellB{fill:#a9d8e8;stroke:#8fbccc;stroke-width:2}.cellG{fill:#ddd;stroke:#bbb;stroke-width:2}.txt{fill:#222;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:24px;font-weight:700;text-anchor:middle}.small{fill:#333;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:18px;font-weight:700;text-anchor:middle}.cap{fill:#555;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:20px;font-weight:700}.mini{fill:#777;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:15px;font-weight:700;text-anchor:middle}.mono{fill:#222;font-family:Consolas,'Cascadia Mono',monospace;font-size:18px;font-weight:700;text-anchor:middle}</style><marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#666"/></marker></defs><rect class="bg" width="960" height="540"/><text class="cap" x="80" y="70">Learning order</text><circle class="blue" cx="105" cy="190" r="28"/><text class="txt" x="105" y="197">1</text><text class="mini" x="105" y="245">Complexity</text><path class="arrow" d="M 105 190 L 210 260"/><circle class="blue" cx="210" cy="260" r="28"/><text class="txt" x="210" y="267">2</text><text class="mini" x="210" y="315">Sorting</text><path class="arrow" d="M 210 260 L 315 190"/><circle class="blue" cx="315" cy="190" r="28"/><text class="txt" x="315" y="197">3</text><text class="mini" x="315" y="245">Binary</text><path class="arrow" d="M 315 190 L 420 260"/><circle class="blue" cx="420" cy="260" r="28"/><text class="txt" x="420" y="267">4</text><text class="mini" x="420" y="315">Stack</text><path class="arrow" d="M 420 260 L 525 190"/><circle class="gray" cx="525" cy="190" r="28"/><text class="txt" x="525" y="197">5</text><text class="mini" x="525" y="245">Graph</text><path class="arrow" d="M 525 190 L 630 260"/><circle class="gray" cx="630" cy="260" r="28"/><text class="txt" x="630" y="267">6</text><text class="mini" x="630" y="315">Shortest</text><path class="arrow" d="M 630 260 L 735 190"/><circle class="gray" cx="735" cy="190" r="28"/><text class="txt" x="735" y="197">7</text><text class="mini" x="735" y="245">DP</text><path class="arrow" d="M 735 190 L 840 260"/><circle class="gray" cx="840" cy="260" r="28"/><text class="txt" x="840" y="267">8</text><text class="mini" x="840" y="315">Data structures</text></svg>
