<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc"><title id="title">Binary search boundary</title><desc id="desc">Binary search discards half of the candidate interval each step.</desc><defs><style>
