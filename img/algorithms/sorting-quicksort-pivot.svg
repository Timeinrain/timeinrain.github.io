<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc"><title id="title">Quicksort pivot</title><desc id="desc">Quicksort partitions values around a pivot.</desc><defs><style>
  .bg{fill:#f2f2f2}.panel{fill:#fff;stroke:#ddd;stroke-width:2}.blue{fill:#a9d8e8}.blue2{fill:#7fc3dc}.gray{fill:#cfcfcf}.soft{fill:#e2e2e2}.dark{fill:#222}.muted{fill:#777}.line{stroke:#aaa;stroke-width:2;fill:none}.strong{stroke:#333;stroke-width:3;fill:none}.dash{stroke:#999;stroke-width:2;stroke-dasharray:7 7;fill:none}.arrow{stroke:#666;stroke-width:3;fill:none;marker-end:url(#arrow)}.red{fill:#ef8f8f}.green{fill:#9ed68a}.yellow{fill:#f2cf74}.cell{fill:#fff;stroke:#bbb;stroke-width:2}.cellB{fill:#a9d8e8;stroke:#8fbccc;stroke-width:2}.cellG{fill:#ddd;stroke:#bbb;stroke-width:2}.txt{fill:#222;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:24px;font-weight:700;text-anchor:middle}.small{fill:#333;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:18px;font-weight:700;text-anchor:middle}.cap{fill:#555;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:20px;font-weight:700}.mini{fill:#777;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:15px;font-weight:700;text-anchor:middle}.mono{fill:#222;font-family:Consolas,'Cascadia Mono',monospace;font-size:18px;font-weight:700;text-anchor:middle}</style><marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#666"/></marker></defs><rect class="bg" width="960" height="540"/><text class="cap" x="80" y="70">Partition around pivot = 5</text><rect class="cell" x="150" y="130" width="70" height="54" rx="0"/><text class="small" x="185" y="162">7</text><rect class="cell" x="220" y="130" width="70" height="54" rx="0"/><text class="small" x="255" y="162">2</text><rect class="cell" x="290" y="130" width="70" height="54" rx="0"/><text class="small" x="325" y="162">8</text><rect class="cell" x="360" y="130" width="70" height="54" rx="0"/><text class="small" x="395" y="162">1</text><rect class="cellB" x="430" y="130" width="70" height="54" rx="0"/><text class="small" x="465" y="162">5</text><rect class="cell" x="500" y="130" width="70" height="54" rx="0"/><text class="small" x="535" y="162">4</text><rect class="cell" x="570" y="130" width="70" height="54" rx="0"/><text class="small" x="605" y="162">9</text><rect class="cell" x="640" y="130" width="70" height="54" rx="0"/><text class="small" x="675" y="162">3</text><path class="arrow" d="M 430 198 L 430 285"/><text class="small" x="430" y="240">pivot</text><rect class="cellB" x="150" y="330" width="70" height="54" rx="0"/><text class="small" x="185" y="362">2</text><rect class="cellB" x="220" y="330" width="70" height="54" rx="0"/><text class="small" x="255" y="362">1</text><rect class="cellB" x="290" y="330" width="70" height="54" rx="0"/><text class="small" x="325" y="362">4</text><rect class="cellB" x="360" y="330" width="70" height="54" rx="0"/><text class="small" x="395" y="362">3</text><rect class="cellB" x="455" y="330" width="70" height="54" rx="0"/><text class="small" x="490" y="362">5</text><rect class="cellG" x="610" y="330" width="70" height="54" rx="0"/><text class="small" x="645" y="362">7</text><rect class="cellG" x="680" y="330" width="70" height="54" rx="0"/><text class="small" x="715" y="362">8</text><rect class="cellG" x="750" y="330" width="70" height="54" rx="0"/><text class="small" x="785" y="362">9</text><text class="small" x="290" y="420">&lt; pivot</text><text class="small" x="490" y="420">pivot</text><text class="small" x="715" y="420">&gt; pivot</text></svg>
