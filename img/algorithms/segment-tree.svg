<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc"><title id="title">Segment tree</title><desc id="desc">Segment tree recursively splits an interval.</desc><defs><style>
  .bg{fill:#f2f2f2}.panel{fill:#fff;stroke:#ddd;stroke-width:2}.blue{fill:#a9d8e8}.blue2{fill:#7fc3dc}.gray{fill:#cfcfcf}.soft{fill:#e2e2e2}.dark{fill:#222}.muted{fill:#777}.line{stroke:#aaa;stroke-width:2;fill:none}.strong{stroke:#333;stroke-width:3;fill:none}.dash{stroke:#999;stroke-width:2;stroke-dasharray:7 7;fill:none}.arrow{stroke:#666;stroke-width:3;fill:none;marker-end:url(#arrow)}.red{fill:#ef8f8f}.green{fill:#9ed68a}.yellow{fill:#f2cf74}.cell{fill:#fff;stroke:#bbb;stroke-width:2}.cellB{fill:#a9d8e8;stroke:#8fbccc;stroke-width:2}.cellG{fill:#ddd;stroke:#bbb;stroke-width:2}.txt{fill:#222;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:24px;font-weight:700;text-anchor:middle}.small{fill:#333;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:18px;font-weight:700;text-anchor:middle}.cap{fill:#555;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:20px;font-weight:700}.mini{fill:#777;font-family:Arial,'Microsoft YaHei',sans-serif;font-size:15px;font-weight:700;text-anchor:middle}.mono{fill:#222;font-family:Consolas,'Cascadia Mono',monospace;font-size:18px;font-weight:700;text-anchor:middle}</style><marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#666"/></marker></defs><rect class="bg" width="960" height="540"/><text class="cap" x="80" y="70">Segment tree intervals</text><rect class="cellB" x="390" y="95" width="180" height="48" rx="0"/><text class="small" x="480" y="126">[0,7]</text><path class="arrow" d="M 435 143 L 300 220"/><path class="arrow" d="M 525 143 L 660 220"/><rect class="cellG" x="225" y="225" width="150" height="46" rx="0"/><rect class="cellG" x="585" y="225" width="150" height="46" rx="0"/><text class="small" x="300" y="255">[0,3]</text><text class="small" x="660" y="255">[4,7]</text><path class="arrow" d="M 275 272 L 200 345"/><path class="arrow" d="M 325 272 L 400 345"/><rect class="cell" x="140" y="350" width="120" height="42" rx="0"/><rect class="cell" x="340" y="350" width="120" height="42" rx="0"/><text class="small" x="200" y="378">[0,1]</text><text class="small" x="400" y="378">[2,3]</text></svg>
